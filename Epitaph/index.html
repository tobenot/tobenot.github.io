<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>跳转中…</title>
	<script>
		(function () {
			var target = 'https://e.tobenot.top';
			var hash = location.hash;
			var search = location.search;
			var rest = '/';
			if (hash.indexOf('#/') === 0) {
				rest = hash.slice(1);
			}
			location.replace(target + rest + search);
		})();
	</script>
</head>
<body>
	<p>正在跳转到 <a href="https://e.tobenot.top/">e.tobenot.top</a> …</p>
</body>
</html>
