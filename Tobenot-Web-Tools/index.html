<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>跳转中…</title>
	<script>
		(function () {
			var target = 'https://tools.tobenot.top';
			var hash = location.hash;
			var search = location.search;
			if(hash)location.replace(target+"/"+search+hash);else location.replace(target+"/"+search);
		})();
	</script>
</head>
<body>
	<p>正在跳转到 <a href="https://tools.tobenot.top">tools.tobenot.top</a> …</p>
</body>
</html>
